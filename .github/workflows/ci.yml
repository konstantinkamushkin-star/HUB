name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  branch-policy:
    name: Branch Policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch naming
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            echo "Not a pull_request event, branch policy check skipped."
            exit 0
          fi
          if [[ -z "${HEAD_REF}" ]]; then
            echo "Missing pull request branch name."
            exit 1
          fi
          if [[ "${HEAD_REF}" == "main" || "${HEAD_REF}" == "master" ]]; then
            echo "Direct PR from main/master is not allowed."
            exit 1
          fi
          if [[ ! "${HEAD_REF}" =~ ^(release|hotfix|feature|bugfix|chore)/[a-z0-9._-]+$ ]]; then
            echo "Branch '${HEAD_REF}' does not match required pattern:"
            echo "  release/<name>, hotfix/<name>, feature/<name>, bugfix/<name>, chore/<name>"
            exit 1
          fi

  release-audit:
    name: Release Audit
    runs-on: ubuntu-latest
    needs: branch-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Install admin-web dependencies
        run: npm ci
        working-directory: admin-web
      - name: Run pre-release audit
        run: ./scripts/pre_release_audit.sh --skip-build

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: release-audit
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Verify production build
        run: npm run verify:prod-build

  admin-web-build:
    name: Admin Web Build
    runs-on: ubuntu-latest
    needs: release-audit
    defaults:
      run:
        working-directory: admin-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build admin web
        run: npm run build
