# Локальная проверка production-сборки с PostGIS + Redis.
# Из каталога backend:
#   docker compose up --build
# Затем прогоните миграции (с хоста при DB на localhost:5432 или через exec в api после npm ci в образе — см. docs/PRODUCTION_PREP.md).
#
# Обязательно задайте JWT_SECRET и CORS_ORIGINS для реального деплоя; для локального docker подойдут переменные окружения хоста или .env рядом с compose.
#
# Опционально: локальный перевод без Google (LibreTranslate). Первый старт скачивает модели — долго и тяжело по RAM.
#   docker compose --profile translate up -d libretranslate
# Затем у API: LIBRETRANSLATE_URL=http://libretranslate:5000 (или с хоста: http://127.0.0.1:5000).

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      # Должны совпадать с DB_* у api (см. ниже). Иначе импорт с хоста через POSTGRES_PASSWORD ок, а логин в приложении — 500.
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-divehub}
    ports:
      # Если на хосте уже занят 5432 — в .env рядом с compose: POSTGRES_PUBLISH_PORT=5433
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - divehub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Порт 6379 только внутри сети compose (иначе конфликт с redis на хосте).
    command: redis-server --appendonly yes
    volumes:
      - divehub_redis:/data

  # Python UVM: зависимости из uv.lock (opencv-python-headless и др.). Пересборка: docker compose build --no-cache uvm
  uvm:
    build:
      context: ./underwater-vision-module
      dockerfile: Dockerfile
    expose:
      - "8010"
    environment:
      PORT: "8010"
    restart: unless-stopped

  api:
    build: .
    ports:
      # Если на хосте уже занят 3000 — в .env рядом с compose: API_PUBLISH_PORT=3001
      - "${API_PUBLISH_PORT:-3000}:3000"
    # UVM по умолчанию — сервис `uvm` в этой же сети compose. Если UVM на хосте: UVM_URL=http://host.docker.internal:8011 и extra_hosts ниже.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:-docker-local-only-generate-real-secret-for-prod}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_DATABASE: ${POSTGRES_DB:-divehub}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Контейнерный UVM (сервис uvm). Для UVM на хосте задайте в .env: UVM_URL=http://host.docker.internal:8011
      UVM_URL: ${UVM_URL:-http://uvm:8010}
      # Подводный AI в редакторе фото: Nest зовёт POST {AI_UNDERWATER_SERVICE_URL}/process (при 404 — fallback на UVM /v1/...).
      # Должен совпадать с UVM/ai-service в той же docker-сети, иначе health вернёт available:false.
      AI_UNDERWATER_SERVICE_URL: ${AI_UNDERWATER_SERVICE_URL:-http://uvm:8010}
      # Раскомментируйте при `docker compose --profile translate up`:
      # LIBRETRANSLATE_URL: http://libretranslate:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      uvm:
        condition: service_healthy
    volumes:
      - divehub_uploads:/app/uploads

  libretranslate:
    profiles: ["translate"]
    image: libretranslate/libretranslate:latest
    ports:
      - "${LIBRETRANSLATE_PUBLISH_PORT:-5000}:5000"
    environment:
      # Ограничить языки — меньше памяти и времени первого запуска (подстройте под приложение).
      LT_LOAD_ONLY: en,ru,de,fr,es,it,pt,uk,pl,tr,zh,ja,ko,ar
    restart: unless-stopped

volumes:
  divehub_pgdata:
  divehub_redis:
  divehub_uploads:
